name: Publish NPM Package

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-npm
  cancel-in-progress: false

jobs:
  publish-package:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          registry-url: 'https://registry.npmjs.org/'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Read package metadata
        id: package
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          NPM_TAG=$(node -p "require('./package.json').version.includes('-') ? 'next' : 'latest'")
          echo "name=${PACKAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${PACKAGE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "npm_tag=${NPM_TAG}" >> "$GITHUB_OUTPUT"

      - name: Check npm version
        id: npm-version
        run: |
          if npm view "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}" version >/dev/null 2>&1; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build dist from source
        if: steps.npm-version.outputs.should_publish == 'true'
        run: npm run build:publish

      - name: Verify npm package contents
        if: steps.npm-version.outputs.should_publish == 'true'
        run: npm pack --dry-run

      - name: Publish to npm
        if: steps.npm-version.outputs.should_publish == 'true'
        run: npm publish --tag "${{ steps.package.outputs.npm_tag }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
